name: Docker Build & Push

on:
  push:
    branches: [develop, sandbox, master]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lowercase image name
        run: echo "IMAGE_NAME=$(echo '${{ env.REGISTRY }}/${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Read version from package.json
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=develop,enable=${{ github.ref_name == 'develop' }}
            type=raw,value=v${{ steps.version.outputs.version }}-dev,enable=${{ github.ref_name == 'develop' }}
            type=raw,value=latest,enable=${{ github.ref_name == 'master' }}
            type=raw,value=v${{ steps.version.outputs.version }},enable=${{ github.ref_name == 'master' }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: github.ref_name == 'develop' || github.ref_name == 'master'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.ref_name == 'develop' || github.ref_name == 'master' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create git tag
        if: github.ref_name == 'develop' || github.ref_name == 'master'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if [[ "${{ github.ref_name }}" == "develop" ]]; then
            TAG="v${VERSION}-dev"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag -f "$TAG"
            git push origin "$TAG" --force
          else
            TAG="v${VERSION}"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag "$TAG" || echo "Tag $TAG already exists, skipping"
            git push origin "$TAG" || echo "Tag $TAG already pushed, skipping"
          fi
