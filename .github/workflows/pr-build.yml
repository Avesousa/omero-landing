name: PR Docker Build

on:
  pull_request:
    types: [opened, synchronize, reopened]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lowercase image name
        run: echo "IMAGE_NAME=$(echo '${{ env.REGISTRY }}/${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Read version from package.json
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Extract branch type and build tag
        id: branch
        run: |
          BRANCH="${{ github.head_ref }}"
          if [[ $BRANCH == feature/* ]] || [[ $BRANCH == feat/* ]]; then TYPE="feat"
          elif [[ $BRANCH == fix/* ]]; then TYPE="fix"
          elif [[ $BRANCH == chore/* ]]; then TYPE="chore"
          elif [[ $BRANCH == hotfix/* ]]; then TYPE="hotfix"
          else TYPE="pr"
          fi
          echo "type=$TYPE" >> $GITHUB_OUTPUT
          echo "tag=v${{ steps.version.outputs.version }}-${TYPE}-${{ github.event.number }}" >> $GITHUB_OUTPUT

      - name: Post "building" comment on PR
        id: comment
        uses: actions/github-script@v7
        with:
          script: |
            const marker  = '<!-- pr-docker-build -->';
            const tag     = '${{ steps.branch.outputs.tag }}';
            const branch  = '${{ github.head_ref }}';
            const sha     = '${{ github.event.pull_request.head.sha }}'.slice(0, 7);
            const runUrl  = `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`;

            const body = [
              marker,
              '## 🐳 Build report',
              '',
              `**Version \`${tag}\` is being created** ⏳`,
              '',
              '| | |',
              '|---|---|',
              `| Branch | \`${branch}\` |`,
              `| Commit | \`${sha}\` |`,
              '',
              `> Status can be followed [here](${runUrl}).`,
              `> Logs can be found [here](${runUrl}).`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));

            let commentId;
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: existing.id, body,
              });
              commentId = existing.id;
            } else {
              const res = await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.issue.number, body,
              });
              commentId = res.data.id;
            }
            core.setOutput('comment_id', commentId);

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.branch.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update comment with result
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const marker   = '<!-- pr-docker-build -->';
            const tag      = '${{ steps.branch.outputs.tag }}';
            const image    = '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}';
            const branch   = '${{ github.head_ref }}';
            const sha      = '${{ github.event.pull_request.head.sha }}'.slice(0, 7);
            const runUrl   = `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`;
            const success  = '${{ steps.build.outcome }}' === 'success';
            const commentId = ${{ steps.comment.outputs.comment_id }};

            const statusLine = success
              ? `**Version \`${tag}\` built successfully** ✅`
              : `**Version \`${tag}\` build failed** ❌`;

            const lines = [
              marker,
              '## 🐳 Build report',
              '',
              statusLine,
              '',
              '| | |',
              '|---|---|',
              `| Branch | \`${branch}\` |`,
              `| Commit | \`${sha}\` |`,
            ];

            if (success) {
              lines.push(`| Image | \`${image}:${tag}\` |`);
              lines.push('', '```', `docker pull ${image}:${tag}`, '```');
            }

            lines.push('', `> Logs can be found [here](${runUrl}).`);

            await github.rest.issues.updateComment({
              owner: context.repo.owner, repo: context.repo.repo,
              comment_id: commentId, body: lines.join('\n'),
            });
