name: PR Docker Build

on:
  pull_request:
    types: [opened, synchronize, reopened]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version from package.json
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Extract branch type from PR branch name
        id: branch
        run: |
          BRANCH="${{ github.head_ref }}"
          if [[ $BRANCH == feature/* ]] || [[ $BRANCH == feat/* ]]; then
            TYPE="feat"
          elif [[ $BRANCH == fix/* ]]; then
            TYPE="fix"
          elif [[ $BRANCH == chore/* ]]; then
            TYPE="chore"
          elif [[ $BRANCH == hotfix/* ]]; then
            TYPE="hotfix"
          else
            TYPE="pr"
          fi
          echo "type=$TYPE" >> $GITHUB_OUTPUT
          echo "tag=v${{ steps.version.outputs.version }}-${TYPE}-${{ github.event.number }}" >> $GITHUB_OUTPUT

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.branch.outputs.tag }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Comment image tag on PR
        uses: actions/github-script@v7
        with:
          script: |
            const tag = "${{ steps.branch.outputs.tag }}";
            const image = "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}";
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🐳 **Docker image built for this PR:**\n\`\`\`\ndocker pull ${image}:${tag}\n\`\`\``
            });
